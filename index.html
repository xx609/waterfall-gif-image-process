<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Waterfall GIF Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="content">
    <label class="wf-field" for="image-upload">
      <span class="wf-label">Upload image</span>
      <input id="image-upload" type="file" accept="image/*">
    </label>

    <label class="wf-field" for="frame-rate">
      <span class="wf-label">Frame rate</span>
      <input id="frame-rate" type="number" min="1" max="60" step="1" value="12" inputmode="numeric">
    </label>

    <section id="output-section" class="wf-output" aria-live="polite" aria-busy="false">
      <p id="status-message" class="wf-status">Upload an image to generate a waterfall GIF.</p>
      <p id="error-message" class="wf-error" role="alert" hidden></p>
      <img id="output-image" alt="" hidden>
    </section>

    <button id="download-button" type="button" disabled>Download GIF</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
